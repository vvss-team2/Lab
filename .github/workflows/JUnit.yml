name: Maven Projects CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
    paths:
      - "pom.xml"
      - "*/pom.xml"
      - "*/src/**"
      - "*/.mvn/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: maven-projects-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-projects:
    name: Detect Changed Maven Projects
    runs-on: ubuntu-latest
    outputs:
      all_projects: ${{ steps.detect.outputs.all_projects }}
      projects: ${{ steps.detect.outputs.projects }}
      has_projects: ${{ steps.detect.outputs.has_projects }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Changed Projects
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t all_projects < <(find . -mindepth 2 -maxdepth 2 -name pom.xml -printf '%h\n' | sed 's|^\./||' | sort)
          all_projects_json="$(printf '%s\n' "${all_projects[@]}" | jq -R . | jq -sc .)"

          run_all=false
          changed_files=''

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "push" ]]; then
            run_all=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.sha }}"
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              run_all=true
            else
              changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
            fi
          fi

          if [[ "$run_all" == false ]]; then
            if grep -Eq '^(pom\.xml|\.github/workflows/)' <<< "$changed_files"; then
              run_all=true
            fi
          fi

          if [[ "$run_all" == true ]]; then
            selected_projects=("${all_projects[@]}")
          else
            mapfile -t selected_projects < <(
              while IFS= read -r file; do
                [[ -z "$file" ]] && continue
                project_dir="${file%%/*}"
                if [[ -f "$project_dir/pom.xml" ]]; then
                  printf '%s\n' "$project_dir"
                fi
              done <<< "$changed_files" | sort -u
            )
          fi

          if [[ ${#selected_projects[@]} -eq 0 ]]; then
            projects_json='[]'
            has_projects=false
          else
            projects_json="$(printf '%s\n' "${selected_projects[@]}" | jq -R . | jq -sc .)"
            has_projects=true
          fi

          echo "all_projects=$all_projects_json" >> "$GITHUB_OUTPUT"
          echo "projects=$projects_json" >> "$GITHUB_OUTPUT"
          echo "has_projects=$has_projects" >> "$GITHUB_OUTPUT"

  test-projects:
    name: Test ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: detect-projects
    if: needs.detect-projects.outputs.has_projects == 'true'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-projects.outputs.projects) }}
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and Run Tests
        run: mvn -B -f "${{ matrix.project }}/pom.xml" clean test jacoco:report

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: ${{ matrix.project }} Test Report
          report_paths: ${{ matrix.project }}/target/surefire-reports/TEST-*.xml
          detailed_summary: true
          include_passed: true

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: ${{ matrix.project }}-surefire-reports
          path: ${{ matrix.project }}/target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Allure Results
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: ${{ matrix.project }}-allure-results
          path: ${{ matrix.project }}/target/allure-results
          if-no-files-found: error

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: ${{ matrix.project }}-jacoco-report
          path: ${{ matrix.project }}/target/site/jacoco
          if-no-files-found: ignore

  publish-allure-report:
    name: Publish Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - detect-projects
      - test-projects
    if: always() && needs.detect-projects.outputs.has_projects == 'true' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download Current Allure Results
        uses: actions/download-artifact@v6
        with:
          pattern: "*-allure-results"
          path: current-allure-results

      - name: Download Current JaCoCo Reports
        uses: actions/download-artifact@v6
        with:
          pattern: "*-jacoco-report"
          path: current-jacoco-reports

      - name: Restore Previous Allure State
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p previous-allure-state

          workflow_runs_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/JUnit.yml/runs?branch=main&status=completed&per_page=20")"

          previous_run_id="$(jq -r --argjson current_run "${GITHUB_RUN_ID}" '
            .workflow_runs[]
            | select(.id != $current_run and .conclusion == "success")
            | .id
          ' <<< "${workflow_runs_json}" | head -n 1)"

          if [[ -z "${previous_run_id}" ]]; then
            echo "No previous successful main run found."
            exit 0
          fi

          artifacts_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${previous_run_id}/artifacts?per_page=100")"

          artifact_id="$(jq -r '
            .artifacts[]
            | select(.name == "allure-state" and .expired == false)
            | .id
          ' <<< "${artifacts_json}" | head -n 1)"

          if [[ -z "${artifact_id}" ]]; then
            echo "No previous allure-state artifact found."
            exit 0
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
            -o allure-state.zip

          unzip -q allure-state.zip -d previous-allure-state

          if [[ -d previous-allure-state/allure-state ]]; then
            cp -R previous-allure-state/allure-state/. previous-allure-state/
            rm -rf previous-allure-state/allure-state
          fi

      - name: Merge Allure Results and History
        env:
          ALL_PROJECTS: ${{ needs.detect-projects.outputs.all_projects }}
          CHANGED_PROJECTS: ${{ needs.detect-projects.outputs.projects }}
        run: |
          set -euo pipefail

          mkdir -p combined-project-results
          mkdir -p merged-allure-results
          mkdir -p allure-state/project-results

          if [[ -d previous-allure-state/project-results ]]; then
            cp -R previous-allure-state/project-results/. combined-project-results/
          fi

          while IFS= read -r project_dir; do
            project_name="$(basename "${project_dir}")"

            if ! jq -e --arg project "${project_name}" '.[] == $project' <<< "${ALL_PROJECTS}" >/dev/null; then
              rm -rf "${project_dir}"
            fi
          done < <(find combined-project-results -mindepth 1 -maxdepth 1 -type d | sort)

          while IFS= read -r project; do
            [[ -z "${project}" ]] && continue

            current_project_dir="current-allure-results/${project}-allure-results"
            if [[ ! -d "${current_project_dir}" ]] \
              && jq -e --arg project "${project}" 'length == 1 and .[0] == $project' <<< "${CHANGED_PROJECTS}" >/dev/null \
              && find current-allure-results -mindepth 1 -maxdepth 1 -type f | grep -q .; then
              current_project_dir="current-allure-results"
            fi

            if [[ -d "${current_project_dir}" ]]; then
              rm -rf "combined-project-results/${project}"
              mkdir -p "combined-project-results/${project}"
              cp -R "${current_project_dir}/." "combined-project-results/${project}/"
            fi
          done < <(jq -r '.[]' <<< "${ALL_PROJECTS}")

          if [[ -d previous-allure-state/history ]]; then
            cp -R previous-allure-state/history merged-allure-results/history
          fi

          while IFS= read -r project_dir; do
            project_name="$(basename "${project_dir}")"
            mkdir -p "allure-state/project-results/${project_name}"
            cp -R "${project_dir}/." "allure-state/project-results/${project_name}/"
          done < <(find combined-project-results -mindepth 1 -maxdepth 1 -type d | sort)

          while IFS= read -r result_file; do
            cp "${result_file}" merged-allure-results/
          done < <(find combined-project-results -type f | sort)

          if ! find merged-allure-results -mindepth 1 -maxdepth 1 -type f | grep -q .; then
            echo "No Allure result files available to publish." >&2
            exit 1
          fi

      - name: Write Allure Executor Metadata
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          WORKFLOW_NAME: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          build_url="${SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
          report_url="https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/"

          cat > merged-allure-results/executor.json <<EOF
          {
            "reportName": "${WORKFLOW_NAME} #${RUN_NUMBER}",
            "buildOrder": ${RUN_NUMBER},
            "reportUrl": "${report_url}",
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${WORKFLOW_NAME} #${RUN_NUMBER}",
            "buildUrl": "${build_url}"
          }
          EOF

      - name: Generate Allure Report
        run: |
          set -euo pipefail
          curl -fsSL -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure.tgz
          ./allure-2.29.0/bin/allure generate merged-allure-results -o allure-report --clean

          mkdir -p allure-state
          cp -R allure-report/history allure-state/history

      - name: Build Coverage Pages
        run: |
          set -euo pipefail

          mkdir -p allure-report/coverage

          {
            echo '<!doctype html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '  <meta charset="utf-8" />'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1" />'
            echo '  <title>Coverage Reports</title>'
            echo '  <style>'
            echo '    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; background: #f7f8fb; color: #1d2433; }'
            echo '    h1 { margin-top: 0; }'
            echo '    ul { padding-left: 1.2rem; }'
            echo '    li { margin: 0.5rem 0; }'
            echo '    a { color: #0057b8; text-decoration: none; }'
            echo '    a:hover { text-decoration: underline; }'
            echo '    .empty { color: #5a6478; }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <h1>JaCoCo Coverage Reports</h1>'
            echo '  <p>Coverage generated for each tested Maven project.</p>'
            echo '  <ul>'
          } > allure-report/coverage/index.html

          found_reports=0
          if [[ -d current-jacoco-reports ]]; then
            while IFS= read -r report_dir; do
              project_name="$(basename "${report_dir}")"
              project_name="${project_name%-jacoco-report}"

              if [[ -f "${report_dir}/index.html" ]]; then
                mkdir -p "allure-report/coverage/${project_name}"
                cp -R "${report_dir}/." "allure-report/coverage/${project_name}/"
                echo "    <li><a href=\"./${project_name}/index.html\">${project_name}</a></li>" >> allure-report/coverage/index.html
                found_reports=1
              fi
            done < <(find current-jacoco-reports -mindepth 1 -maxdepth 1 -type d | sort)
          fi

          if [[ "${found_reports}" -eq 0 ]]; then
            echo '    <li class="empty">No JaCoCo report artifacts were found for this run.</li>' >> allure-report/coverage/index.html
          fi

          {
            echo '  </ul>'
            echo '</body>'
            echo '</html>'
          } >> allure-report/coverage/index.html

      - name: Add Coverage Link in Allure UI
        run: |
          set -euo pipefail

          cat > allure-report/coverage-link.js <<'EOF'
          (function () {
            var addLink = function () {
              if (!document.body || document.getElementById('coverage-link-btn')) {
                return;
              }
              var link = document.createElement('a');
              link.id = 'coverage-link-btn';
              link.href = './coverage/index.html';
              link.textContent = 'Coverage';
              link.style.position = 'fixed';
              link.style.right = '16px';
              link.style.bottom = '16px';
              link.style.zIndex = '9999';
              link.style.padding = '10px 14px';
              link.style.borderRadius = '8px';
              link.style.background = '#0057b8';
              link.style.color = '#ffffff';
              link.style.fontFamily = 'system-ui, sans-serif';
              link.style.fontWeight = '600';
              link.style.textDecoration = 'none';
              link.style.boxShadow = '0 6px 18px rgba(0, 0, 0, 0.18)';
              document.body.appendChild(link);
            };

            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', addLink);
            } else {
              addLink();
            }
          })();
          EOF

          if ! grep -q 'coverage-link.js' allure-report/index.html; then
            sed -i 's#</body>#  <script src="./coverage-link.js"></script>\n</body>#' allure-report/index.html
          fi

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: error

      - name: Upload Allure State Artifact
        uses: actions/upload-artifact@v6
        with:
          name: allure-state
          path: allure-state
          if-no-files-found: error
          retention-days: 90

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
