name: Maven Projects CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
    paths:
      - "pom.xml"
      - "*/pom.xml"
      - "*/src/**"
      - "*/.mvn/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: maven-projects-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-projects:
    name: Detect Changed Maven Projects
    runs-on: ubuntu-latest
    outputs:
      all_projects: ${{ steps.detect.outputs.all_projects }}
      projects: ${{ steps.detect.outputs.projects }}
      has_projects: ${{ steps.detect.outputs.has_projects }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Changed Projects
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t all_projects < <(find . -mindepth 2 -maxdepth 2 -name pom.xml -printf '%h\n' | sed 's|^\./||' | sort)
          all_projects_json="$(printf '%s\n' "${all_projects[@]}" | jq -R . | jq -sc .)"

          run_all=false
          changed_files=''

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "push" ]]; then
            run_all=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.sha }}"
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              run_all=true
            else
              changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
            fi
          fi

          if [[ "$run_all" == false ]]; then
            if grep -Eq '^(pom\.xml|\.github/workflows/)' <<< "$changed_files"; then
              run_all=true
            fi
          fi

          if [[ "$run_all" == true ]]; then
            selected_projects=("${all_projects[@]}")
          else
            mapfile -t selected_projects < <(
              while IFS= read -r file; do
                [[ -z "$file" ]] && continue
                project_dir="${file%%/*}"
                if [[ -f "$project_dir/pom.xml" ]]; then
                  printf '%s\n' "$project_dir"
                fi
              done <<< "$changed_files" | sort -u
            )
          fi

          if [[ ${#selected_projects[@]} -eq 0 ]]; then
            projects_json='[]'
            has_projects=false
          else
            projects_json="$(printf '%s\n' "${selected_projects[@]}" | jq -R . | jq -sc .)"
            has_projects=true
          fi

          echo "all_projects=$all_projects_json" >> "$GITHUB_OUTPUT"
          echo "projects=$projects_json" >> "$GITHUB_OUTPUT"
          echo "has_projects=$has_projects" >> "$GITHUB_OUTPUT"

  test-projects:
    name: Test ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: detect-projects
    if: needs.detect-projects.outputs.has_projects == 'true'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-projects.outputs.projects) }}
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and Run Tests
        run: mvn -B -f "${{ matrix.project }}/pom.xml" clean test jacoco:report

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: ${{ matrix.project }} Test Report
          report_paths: ${{ matrix.project }}/target/surefire-reports/TEST-*.xml
          detailed_summary: true
          include_passed: true

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: ${{ matrix.project }}-surefire-reports
          path: ${{ matrix.project }}/target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Allure Results
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: ${{ matrix.project }}-allure-results
          path: ${{ matrix.project }}/target/allure-results
          if-no-files-found: error

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: ${{ matrix.project }}-jacoco-report
          path: ${{ matrix.project }}/target/site/jacoco
          if-no-files-found: ignore

  publish-allure-report:
    name: Publish Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - detect-projects
      - test-projects
    if: always() && needs.detect-projects.outputs.has_projects == 'true' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download Current Allure Results
        uses: actions/download-artifact@v6
        with:
          pattern: "*-allure-results"
          path: current-allure-results

      - name: Download Current JaCoCo Reports
        uses: actions/download-artifact@v6
        with:
          pattern: "*-jacoco-report"
          path: current-jacoco-reports

      - name: Restore Previous Allure State
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p previous-allure-state

          workflow_runs_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/JUnit.yml/runs?branch=main&status=completed&per_page=20")"

          previous_run_id="$(jq -r --argjson current_run "${GITHUB_RUN_ID}" '
            .workflow_runs[]
            | select(.id != $current_run and .conclusion == "success")
            | .id
          ' <<< "${workflow_runs_json}" | head -n 1)"

          if [[ -z "${previous_run_id}" ]]; then
            echo "No previous successful main run found."
            exit 0
          fi

          artifacts_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${previous_run_id}/artifacts?per_page=100")"

          artifact_id="$(jq -r '
            .artifacts[]
            | select(.name == "allure-state" and .expired == false)
            | .id
          ' <<< "${artifacts_json}" | head -n 1)"

          if [[ -z "${artifact_id}" ]]; then
            echo "No previous allure-state artifact found."
            exit 0
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
            -o allure-state.zip

          unzip -q allure-state.zip -d previous-allure-state

          if [[ -d previous-allure-state/allure-state ]]; then
            cp -R previous-allure-state/allure-state/. previous-allure-state/
            rm -rf previous-allure-state/allure-state
          fi

      - name: Merge Allure Results and History
        env:
          ALL_PROJECTS: ${{ needs.detect-projects.outputs.all_projects }}
          CHANGED_PROJECTS: ${{ needs.detect-projects.outputs.projects }}
        run: |
          set -euo pipefail

          mkdir -p combined-project-results
          mkdir -p merged-allure-results
          mkdir -p allure-state/project-results

          if [[ -d previous-allure-state/project-results ]]; then
            cp -R previous-allure-state/project-results/. combined-project-results/
          fi

          while IFS= read -r project_dir; do
            project_name="$(basename "${project_dir}")"

            if ! jq -e --arg project "${project_name}" '.[] == $project' <<< "${ALL_PROJECTS}" >/dev/null; then
              rm -rf "${project_dir}"
            fi
          done < <(find combined-project-results -mindepth 1 -maxdepth 1 -type d | sort)

          while IFS= read -r project; do
            [[ -z "${project}" ]] && continue

            current_project_dir="current-allure-results/${project}-allure-results"
            if [[ ! -d "${current_project_dir}" ]] \
              && jq -e --arg project "${project}" 'length == 1 and .[0] == $project' <<< "${CHANGED_PROJECTS}" >/dev/null \
              && find current-allure-results -mindepth 1 -maxdepth 1 -type f | grep -q .; then
              current_project_dir="current-allure-results"
            fi

            if [[ -d "${current_project_dir}" ]]; then
              rm -rf "combined-project-results/${project}"
              mkdir -p "combined-project-results/${project}"
              cp -R "${current_project_dir}/." "combined-project-results/${project}/"
            fi
          done < <(jq -r '.[]' <<< "${ALL_PROJECTS}")

          if [[ -d previous-allure-state/history ]]; then
            cp -R previous-allure-state/history merged-allure-results/history
          fi

          while IFS= read -r project_dir; do
            project_name="$(basename "${project_dir}")"
            mkdir -p "allure-state/project-results/${project_name}"
            cp -R "${project_dir}/." "allure-state/project-results/${project_name}/"
          done < <(find combined-project-results -mindepth 1 -maxdepth 1 -type d | sort)

          while IFS= read -r result_file; do
            cp "${result_file}" merged-allure-results/
          done < <(find combined-project-results -type f | sort)

          if ! find merged-allure-results -mindepth 1 -maxdepth 1 -type f | grep -q .; then
            echo "No Allure result files available to publish." >&2
            exit 1
          fi

      - name: Write Allure Executor Metadata
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          WORKFLOW_NAME: ${{ github.workflow }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          build_url="${SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
          report_url="https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/"

          cat > merged-allure-results/executor.json <<EOF
          {
            "reportName": "${WORKFLOW_NAME} #${RUN_NUMBER}",
            "buildOrder": ${RUN_NUMBER},
            "reportUrl": "${report_url}",
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${WORKFLOW_NAME} #${RUN_NUMBER}",
            "buildUrl": "${build_url}"
          }
          EOF

      - name: Generate Allure Report
        run: |
          set -euo pipefail
          curl -fsSL -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure.tgz
          ./allure-2.29.0/bin/allure generate merged-allure-results -o allure-report --clean

          mkdir -p allure-state
          cp -R allure-report/history allure-state/history

      - name: Build Coverage Pages
        run: |
          set -euo pipefail

          mkdir -p allure-report/coverage

          manifest_tmp="$(mktemp)"
          echo '[]' > "${manifest_tmp}"

          found_reports=0
          if [[ -d current-jacoco-reports ]]; then
            while IFS= read -r report_dir; do
              project_name="$(basename "${report_dir}")"
              project_name="${project_name%-jacoco-report}"

              if [[ -f "${report_dir}/index.html" ]]; then
                mkdir -p "allure-report/coverage/${project_name}"
                cp -R "${report_dir}/." "allure-report/coverage/${project_name}/"
                found_reports=1

                line_pct=0
                branch_pct=0
                instruction_pct=0
                if [[ -f "${report_dir}/jacoco.xml" ]]; then
                  read -r line_pct branch_pct instruction_pct < <(python3 -c "
          import xml.etree.ElementTree as ET, sys
          tree = ET.parse('${report_dir}/jacoco.xml')
          root = tree.getroot()
          stats = {}
          for c in root.findall('counter'):
              t = c.get('type')
              missed = int(c.get('missed', 0))
              covered = int(c.get('covered', 0))
              total = missed + covered
              stats[t] = round(covered * 100 / total, 1) if total > 0 else 0.0
          print(stats.get('LINE', 0.0), stats.get('BRANCH', 0.0), stats.get('INSTRUCTION', 0.0))
          ")
                fi

                jq --arg name "${project_name}" \
                   --argjson line "${line_pct}" \
                   --argjson branch "${branch_pct}" \
                   --argjson instruction "${instruction_pct}" \
                   '. + [{"name": $name, "line": $line, "branch": $branch, "instruction": $instruction}]' \
                   "${manifest_tmp}" > "${manifest_tmp}.new" && mv "${manifest_tmp}.new" "${manifest_tmp}"
              fi
            done < <(find current-jacoco-reports -mindepth 1 -maxdepth 1 -type d | sort)
          fi

          jq '{ projects: . }' "${manifest_tmp}" > allure-report/coverage/manifest.json
          rm -f "${manifest_tmp}"

          {
            echo '<!doctype html><html lang="en"><head><meta charset="utf-8"/>'
            echo '<meta name="viewport" content="width=device-width,initial-scale=1"/>'
            echo '<title>Coverage Reports</title>'
            echo '<style>'
            echo 'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:2rem;background:#f7f8fb;color:#1d2433}'
            echo 'h1{margin-top:0} ul{padding-left:1.2rem} li{margin:.5rem 0}'
            echo 'a{color:#0057b8;text-decoration:none} a:hover{text-decoration:underline}'
            echo '.empty{color:#5a6478}'
            echo '</style></head><body>'
            echo '<h1>JaCoCo Coverage Reports</h1>'
            echo '<p>Coverage generated for each tested Maven project.</p><ul>'
          } > allure-report/coverage/index.html

          if [[ "${found_reports}" -eq 0 ]]; then
            echo '<li class="empty">No JaCoCo report artifacts were found for this run.</li>' >> allure-report/coverage/index.html
          else
            jq -r '.projects[] | .name' allure-report/coverage/manifest.json | while read -r pname; do
              echo "<li><a href=\"./${pname}/index.html\">${pname}</a></li>" >> allure-report/coverage/index.html
            done
          fi

          echo '</ul></body></html>' >> allure-report/coverage/index.html

      - name: Integrate Coverage into Allure UI
        run: |
          set -euo pipefail

          # ── CSS ──────────────────────────────────────────────────
          cat > allure-report/coverage-integration.css <<'CSSEOF'
          /* ── sidebar link ── */
          .side-nav__link--coverage .side-nav__icon {
            display: inline-flex; align-items: center; justify-content: center;
          }
          .side-nav__link--coverage .side-nav__icon svg {
            width: 18px; height: 18px; fill: currentColor;
          }

          /* ── overview widget ── */
          .cov-widget { background: #fff; border-radius: 4px; padding: 20px 25px; }
          .cov-widget__title {
            margin: 0 0 16px; font-size: 14px; font-weight: 600;
            color: #999; text-transform: uppercase; letter-spacing: .03em;
          }
          .cov-widget__row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 0; border-bottom: 1px solid #f0f0f0;
            text-decoration: none; color: inherit;
          }
          .cov-widget__row:last-child { border-bottom: none; }
          .cov-widget__row:hover { background: #fafbfd; border-radius: 4px; }
          .cov-widget__name {
            flex: 0 0 140px; font-size: 13px; font-weight: 600;
            color: #252a36; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
          }
          .cov-widget__bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
          .cov-widget__bar-row { display: flex; align-items: center; gap: 6px; }
          .cov-widget__bar-label {
            flex: 0 0 72px; font-size: 10px; color: #999;
            text-transform: uppercase; letter-spacing: .03em;
          }
          .cov-widget__bar-track {
            flex: 1; height: 8px; background: #eceff5; border-radius: 4px; overflow: hidden;
          }
          .cov-widget__bar-fill {
            height: 100%; border-radius: 4px;
            transition: width .3s ease;
          }
          .cov-widget__bar-pct {
            flex: 0 0 40px; font-size: 11px; font-weight: 600;
            text-align: right; color: #252a36;
          }
          .cov-bar--green  { background: #97cc64; }
          .cov-bar--yellow { background: #ffd050; }
          .cov-bar--red    { background: #fd5a3e; }
          .cov-widget__empty {
            font-size: 13px; color: #999; padding: 12px 0;
          }
          CSSEOF

          # ── JS ───────────────────────────────────────────────────
          cat > allure-report/coverage-integration.js <<'JSEOF'
          (function () {
            'use strict';

            /* ── helpers ── */
            function barColor(pct) {
              if (pct >= 70) return 'cov-bar--green';
              if (pct >= 40) return 'cov-bar--yellow';
              return 'cov-bar--red';
            }

            function loadManifest() {
              return fetch('./coverage/manifest.json', { cache: 'no-store' })
                .then(function (r) { return r.ok ? r.json() : { projects: [] }; })
                .catch(function () { return { projects: [] }; });
            }

            /* ── 1. Sidebar link ── */
            var SIDEBAR_ID = 'cov-sidebar-link';
            var COV_ICON = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.86-7-7.93 0-.62.08-1.22.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>';

            function addSidebarLink() {
              if (document.getElementById(SIDEBAR_ID)) return;
              var menu = document.querySelector('.side-nav__menu, [class*="side-nav"] ul');
              if (!menu) return;

              var li = document.createElement('li');
              var a = document.createElement('a');
              a.id = SIDEBAR_ID;
              a.className = 'side-nav__link side-nav__link--coverage';
              a.href = './coverage/index.html';
              a.target = '_blank';
              a.rel = 'noopener';

              var icon = document.createElement('span');
              icon.className = 'side-nav__icon';
              icon.innerHTML = COV_ICON;

              var label = document.createTextNode('Coverage');
              a.appendChild(icon);
              a.appendChild(label);
              li.appendChild(a);
              menu.appendChild(li);
            }

            /* ── 2. Overview widget ── */
            var WIDGET_ID = 'cov-overview-widget';

            function buildBar(label, pct) {
              var row = document.createElement('div');
              row.className = 'cov-widget__bar-row';

              var lbl = document.createElement('span');
              lbl.className = 'cov-widget__bar-label';
              lbl.textContent = label;

              var track = document.createElement('div');
              track.className = 'cov-widget__bar-track';

              var fill = document.createElement('div');
              fill.className = 'cov-widget__bar-fill ' + barColor(pct);
              fill.style.width = pct + '%';

              var num = document.createElement('span');
              num.className = 'cov-widget__bar-pct';
              num.textContent = pct.toFixed(1) + '%';

              track.appendChild(fill);
              row.appendChild(lbl);
              row.appendChild(track);
              row.appendChild(num);
              return row;
            }

            function addOverviewWidget(manifest) {
              if (document.getElementById(WIDGET_ID)) return;

              var hash = (location.hash || '#').replace(/^#\/?/, '');
              if (hash !== '' && hash !== 'overview') return;

              var grid = document.querySelector('.widgets-grid, [class*="widgets-grid"]');
              if (!grid) return;

              var widget = document.createElement('div');
              widget.id = WIDGET_ID;
              widget.className = 'cov-widget';

              var title = document.createElement('h2');
              title.className = 'cov-widget__title';
              title.textContent = 'Code Coverage';
              widget.appendChild(title);

              var projects = manifest.projects || [];
              if (projects.length === 0) {
                var empty = document.createElement('p');
                empty.className = 'cov-widget__empty';
                empty.textContent = 'No coverage data available for this run.';
                widget.appendChild(empty);
              } else {
                projects.forEach(function (p) {
                  var name = typeof p === 'string' ? p : p.name;
                  var line = (typeof p === 'object' && p.line) || 0;
                  var branch = (typeof p === 'object' && p.branch) || 0;
                  var instr = (typeof p === 'object' && p.instruction) || 0;

                  var row = document.createElement('a');
                  row.className = 'cov-widget__row';
                  row.href = './coverage/' + encodeURIComponent(name) + '/index.html';
                  row.target = '_blank';
                  row.rel = 'noopener';

                  var nameEl = document.createElement('span');
                  nameEl.className = 'cov-widget__name';
                  nameEl.textContent = name;

                  var bars = document.createElement('div');
                  bars.className = 'cov-widget__bars';
                  bars.appendChild(buildBar('Line', line));
                  bars.appendChild(buildBar('Branch', branch));
                  bars.appendChild(buildBar('Instr', instr));

                  row.appendChild(nameEl);
                  row.appendChild(bars);
                  widget.appendChild(row);
                });
              }

              /* insert as first widget so it is prominent */
              if (grid.firstChild) {
                grid.insertBefore(widget, grid.firstChild);
              } else {
                grid.appendChild(widget);
              }
            }

            /* ── 3. Bootstrap ── */
            function run(manifest) {
              addSidebarLink();
              addOverviewWidget(manifest);
            }

            function bootstrap() {
              loadManifest().then(function (manifest) {
                /* initial mount may need a short delay for Allure SPA */
                function attempt() { run(manifest); }
                attempt();
                setTimeout(attempt, 500);
                setTimeout(attempt, 1500);

                /* re-mount on SPA navigation */
                window.addEventListener('hashchange', function () {
                  /* small delay for Allure to render the new route */
                  setTimeout(function () { run(manifest); }, 300);
                });

                /* re-mount if Allure re-renders */
                var observer = new MutationObserver(function () {
                  run(manifest);
                });
                observer.observe(document.body, { childList: true, subtree: true });
              });
            }

            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', bootstrap);
            } else {
              bootstrap();
            }
          })();
          JSEOF

          # ── inject into Allure index.html ──
          if ! grep -q 'coverage-integration.js' allure-report/index.html; then
            sed -i 's#</head>#  <link rel="stylesheet" href="./coverage-integration.css" />\n</head>#' allure-report/index.html
            sed -i 's#</body>#  <script src="./coverage-integration.js"></script>\n</body>#' allure-report/index.html
          fi

      - name: Upload Allure Report Artifact
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: error

      - name: Upload Allure State Artifact
        uses: actions/upload-artifact@v6
        with:
          name: allure-state
          path: allure-state
          if-no-files-found: error
          retention-days: 90

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
