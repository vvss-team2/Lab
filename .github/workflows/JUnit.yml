name: Maven Projects CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "pom.xml"
      - "*/pom.xml"
      - "*/src/**"
      - "*/.mvn/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "pom.xml"
      - "*/pom.xml"
      - "*/src/**"
      - "*/.mvn/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: maven-projects-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-projects:
    name: Detect Changed Maven Projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      has_projects: ${{ steps.detect.outputs.has_projects }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Changed Projects
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t all_projects < <(find . -mindepth 2 -maxdepth 2 -name pom.xml -printf '%h\n' | sed 's|^\./||' | sort)

          run_all=false
          changed_files=''

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            run_all=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.sha }}"
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              run_all=true
            else
              changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
            fi
          fi

          if [[ "$run_all" == false ]]; then
            if grep -Eq '^(pom\.xml|\.github/workflows/)' <<< "$changed_files"; then
              run_all=true
            fi
          fi

          if [[ "$run_all" == true ]]; then
            selected_projects=("${all_projects[@]}")
          else
            mapfile -t selected_projects < <(
              while IFS= read -r file; do
                [[ -z "$file" ]] && continue
                project_dir="${file%%/*}"
                if [[ -f "$project_dir/pom.xml" ]]; then
                  printf '%s\n' "$project_dir"
                fi
              done <<< "$changed_files" | sort -u
            )
          fi

          if [[ ${#selected_projects[@]} -eq 0 ]]; then
            projects_json='[]'
            has_projects=false
          else
            projects_json="$(printf '%s\n' "${selected_projects[@]}" | jq -R . | jq -sc .)"
            has_projects=true
          fi

          echo "projects=$projects_json" >> "$GITHUB_OUTPUT"
          echo "has_projects=$has_projects" >> "$GITHUB_OUTPUT"

  test-projects:
    name: Test ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: detect-projects
    if: needs.detect-projects.outputs.has_projects == 'true'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-projects.outputs.projects) }}
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and Run Tests
        run: mvn -B -f "${{ matrix.project }}/pom.xml" test

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: ${{ matrix.project }} Test Report
          report_paths: ${{ matrix.project }}/target/surefire-reports/TEST-*.xml
          detailed_summary: true
          include_passed: true

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v6
        if: success() || failure()
        with:
          name: ${{ matrix.project }}-surefire-reports
          path: ${{ matrix.project }}/target/surefire-reports
          if-no-files-found: ignore
